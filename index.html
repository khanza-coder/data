<!DOCTYPE html>
<html>
<head>
<style>
body{
  font-family: Arial;
  padding:20px;
}

input, select, button{
  width:100%;
  padding:12px;
  margin:8px 0;
  font-size:16px;
}

button{
  background:#222;
  color:white;
  border:none;
  border-radius:5px;
}
</style>
</head>

<body>

<h2>Nota Berjalan</h2>

<label>Toko</label>
<select id="toko">
<option>Hanifa</option>
<option>Meli</option>
<option>Leora</option>
</select>


<label>Ambil Barang</label>
<input id="ambil" type="number" placeholder="Nominal">


<label>Setoran</label>
<input id="setoran" type="number" placeholder="Nominal">


<button onclick="simpan()">SIMPAN</button>


<p id="hasil"></p>


<script>

function simpan(){

let data = {
 toko: document.getElementById("toko").value,
 ambil: document.getElementById("ambil").value,
 setoran: document.getElementById("setoran").value
};


google.script.run
.withSuccessHandler(function(res){
 document.getElementById("hasil").innerHTML=res;

 document.getElementById("ambil").value="";
 document.getElementById("setoran").value="";
})
.simpanData(data);

}

</script>

</body>
</html>
